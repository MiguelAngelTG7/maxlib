<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Clara del huevo -->
  <ellipse cx="50" cy="50" rx="40" ry="35" fill="#F5F5DC" stroke="#E8DCC6" stroke-width="1.5"/>
  
  <!-- Sombra suave en los bordes -->
  <ellipse cx="50" cy="50" rx="40" ry="35" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="2"/>
  
  <!-- Yema del huevo -->
  <circle cx="50" cy="45" r="18" fill="#FFD700" stroke="#FFC700" stroke-width="1"/>
  
  <!-- Brillo en la yema -->
  <ellipse cx="46" cy="40" rx="7" ry="6" fill="#FFEA00" opacity="0.6"/>
</svg>